name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            python-arch: x64
            name-suffix: x64
          - arch: x86
            python-arch: x86
            name-suffix: x86

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python (${{ matrix.arch }})
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.python-arch }}

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller

    - name: Build EXE (${{ matrix.arch }})
      run: |
        python -m PyInstaller --onefile --windowed --name meisai_converter_${{ matrix.name-suffix }} --clean --noupx --icon=NONE meisai_converter_gui.py

    - name: Calculate SHA256
      run: |
        cd dist
        certutil -hashfile meisai_converter_${{ matrix.name-suffix }}.exe SHA256 > meisai_converter_${{ matrix.name-suffix }}.exe.sha256
        type meisai_converter_${{ matrix.name-suffix }}.exe.sha256

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: meisai_converter-windows-${{ matrix.arch }}
        path: |
          dist/meisai_converter_${{ matrix.name-suffix }}.exe
          dist/meisai_converter_${{ matrix.name-suffix }}.exe.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Debug - List downloaded files
      run: |
        echo "=== Artifacts structure ==="
        ls -lR artifacts/
        echo "=========================="

    - name: Prepare release files
      run: |
        mkdir -p release
        cp artifacts/meisai_converter-windows-x64/meisai_converter_x64.exe release/ || echo "x64 exe not found"
        cp artifacts/meisai_converter-windows-x64/meisai_converter_x64.exe.sha256 release/ || echo "x64 sha256 not found"
        cp artifacts/meisai_converter-windows-x86/meisai_converter_x86.exe release/ || echo "x86 exe not found"
        cp artifacts/meisai_converter-windows-x86/meisai_converter_x86.exe.sha256 release/ || echo "x86 sha256 not found"
        ls -la release/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        body: |
          ## クレジットカード明細変換ツール

          Windows用の実行可能ファイルです。ダブルクリックで起動できます。

          ### 📥 ダウンロード

          **お使いのWindowsのバージョンに合わせて選択してください:**

          - **64bit版（推奨）**: `meisai_converter_x64.exe`
            - Windows 10/11 の大半はこちら
            - メモリ4GB以上のPCはほぼ64bit

          - **32bit版**: `meisai_converter_x86.exe`
            - 古いPCや32bit Windowsをお使いの場合

          **確認方法:**
          1. Windows設定を開く
          2. システム → バージョン情報
          3. "システムの種類" を確認
             - "64 ビット オペレーティング システム" → x64版
             - "32 ビット オペレーティング システム" → x86版

          ### ⚠️ セキュリティについて
          このEXEファイルは安全です。ウイルス対策ソフトが警告を出す場合がありますが、
          これは「偽陽性（False Positive）」です。

          - ソースコードは全て公開されています
          - GitHub Actionsで自動ビルドされています
          - SHA256ハッシュ値で改ざんされていないことを確認できます

          ### 使い方
          1. お使いのWindowsに合ったEXEをダウンロード
          2. ダブルクリックで起動
          3. CSVファイルを選択して変換

          ### SHA256ハッシュ値（検証用）
          - `meisai_converter_x64.exe.sha256` - 64bit版
          - `meisai_converter_x86.exe.sha256` - 32bit版
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
