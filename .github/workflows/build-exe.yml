name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            python-arch: x64
            name-suffix: x64
          - arch: x86
            python-arch: x86
            name-suffix: x86

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python (${{ matrix.arch }})
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.python-arch }}

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller

    - name: Build EXE (${{ matrix.arch }})
      run: |
        python -m PyInstaller --onefile --windowed --name meisai_converter_${{ matrix.name-suffix }} --clean --noupx --icon=NONE meisai_converter_gui.py

    - name: Rename EXE for consistency
      run: |
        cd dist
        if (Test-Path "meisai_converter_${{ matrix.name-suffix }}.exe") {
          Rename-Item "meisai_converter_${{ matrix.name-suffix }}.exe" "meisai_converter.exe"
        }

    - name: Calculate SHA256
      run: |
        cd dist
        certutil -hashfile meisai_converter.exe SHA256 > meisai_converter_${{ matrix.name-suffix }}.exe.sha256
        type meisai_converter_${{ matrix.name-suffix }}.exe.sha256

    - name: Rename back with arch suffix
      run: |
        cd dist
        Rename-Item "meisai_converter.exe" "meisai_converter_${{ matrix.name-suffix }}.exe"

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: meisai_converter-windows-${{ matrix.arch }}
        path: |
          dist/meisai_converter_${{ matrix.name-suffix }}.exe
          dist/meisai_converter_${{ matrix.name-suffix }}.exe.sha256

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/meisai_converter_${{ matrix.name-suffix }}.exe
          dist/meisai_converter_${{ matrix.name-suffix }}.exe.sha256
        body: |
          ## クレジットカード明細変換ツール

          Windows用の実行可能ファイルです。ダブルクリックで起動できます。

          ### 📥 ダウンロード

          **お使いのWindowsのバージョンに合わせて選択してください:**

          - **64bit版（推奨）**: `meisai_converter_x64.exe`
            - Windows 10/11 の大半はこちら
            - メモリ4GB以上のPCはほぼ64bit

          - **32bit版**: `meisai_converter_x86.exe`
            - 古いPCや32bit Windowsをお使いの場合

          **確認方法:**
          1. Windows設定を開く
          2. システム → バージョン情報
          3. "システムの種類" を確認
             - "64 ビット オペレーティング システム" → x64版
             - "32 ビット オペレーティング システム" → x86版

          ### ⚠️ セキュリティについて
          このEXEファイルは安全です。ウイルス対策ソフトが警告を出す場合がありますが、
          これは「偽陽性（False Positive）」です。

          - ソースコードは全て公開されています
          - GitHub Actionsで自動ビルドされています
          - SHA256ハッシュ値で改ざんされていないことを確認できます

          ### 使い方
          1. お使いのWindowsに合ったEXEをダウンロード
          2. ダブルクリックで起動
          3. CSVファイルを選択して変換

          ### SHA256ハッシュ値（検証用）
          - `meisai_converter_x64.exe.sha256` - 64bit版
          - `meisai_converter_x86.exe.sha256` - 32bit版
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
